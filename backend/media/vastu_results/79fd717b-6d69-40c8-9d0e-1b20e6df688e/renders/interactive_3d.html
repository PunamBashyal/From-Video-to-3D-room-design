<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Vastu 3D Interactive Room</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d1a;font-family:'Segoe UI',sans-serif;overflow:hidden;display:flex;}
#canvas-container{flex:1;position:relative;}
/* ── Sidebar ─────────────────────────────────────────── */
#sidebar{
  width:230px;flex-shrink:0;background:#0f0f22;
  border-left:1.5px solid #3b2f8f;display:flex;flex-direction:column;
  overflow:hidden;z-index:50;
}
#sidebar-header{
  padding:10px 12px;background:#1a1a35;
  border-bottom:1px solid #3b2f8f;
  font-size:13px;font-weight:700;color:#aac4ff;letter-spacing:.5px;
}
#item-list{flex:1;overflow-y:auto;padding:6px 0;}
#item-list::-webkit-scrollbar{width:4px;}
#item-list::-webkit-scrollbar-thumb{background:#3b2f8f;border-radius:2px;}
.item-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;cursor:pointer;border-left:3px solid transparent;
  transition:background .15s;
}
.item-row:hover{background:#1e1e3a;}
.item-row.active{background:#1e1e3a;border-left-color:#7c6fe0;}
.item-num{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;
}
.item-emoji{font-size:18px;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:11.5px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-zone{font-size:9.5px;color:#7c6fe0;margin-top:1px;}
.item-stat{font-size:9px;font-weight:700;margin-top:1px;}
.item-stat.essential{color:#00ffd0;}
.item-stat.violation{color:#ff6666;}
.item-stat.detected{color:#88aacc;}
#sidebar-legend{
  padding:10px 12px;border-top:1px solid #3b2f8f;
  font-size:10px;color:#888;
}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.leg-sw{width:14px;height:10px;border-radius:2px;flex-shrink:0;}
/* ── Top bar ──────────────────────────────────────────── */
#toggle-btn{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#3b2f8f,#1565c0);
  color:white;border:2px solid #7c6fe0;border-radius:30px;
  padding:8px 24px;font-size:14px;font-weight:700;cursor:pointer;
  z-index:100;box-shadow:0 4px 18px #0008;transition:all .2s;
}
#toggle-btn:hover{background:linear-gradient(135deg,#5544bb,#1e88e5);}
#mode-label{
  position:absolute;top:56px;left:50%;transform:translateX(-50%);
  color:#aac4ff;font-size:11px;letter-spacing:1px;z-index:100;
  background:#0008;padding:3px 12px;border-radius:10px;
}
/* ── Tooltip ─────────────────────────────────────────── */
#tooltip{
  position:absolute;display:none;pointer-events:none;
  background:rgba(10,8,35,0.97);border:1.5px solid #7c6fe0;
  border-radius:12px;padding:10px 14px;color:#e8eaf6;
  font-size:12px;z-index:200;max-width:240px;box-shadow:0 6px 24px #000a;
}
#tooltip .t-name{font-size:15px;font-weight:800;color:#fff;margin-bottom:4px;}
#tooltip .t-emoji{font-size:26px;float:right;margin-left:8px;}
#tooltip .t-zone{color:#ffd966;font-size:11px;margin-bottom:2px;}
#tooltip .t-dir{color:#94a3b8;font-size:10px;margin-bottom:4px;}
#tooltip .t-stat{font-size:11px;font-weight:700;}
#tooltip .t-stat.essential{color:#00ffd0;}
#tooltip .t-stat.violation{color:#ff6666;}
#tooltip .t-stat.detected{color:#88aacc;}
#instructions{
  position:absolute;bottom:14px;left:14px;z-index:100;
  background:rgba(10,8,35,0.85);border:1px solid #3b2f8f;
  border-radius:8px;padding:8px 12px;color:#666;font-size:10px;
}
</style>
</head>
<body>
<div id="canvas-container">
  <button id="toggle-btn">&#8644; Toggle Layout</button>
  <div id="mode-label">CURRENT LAYOUT</div>
  <div id="tooltip"></div>
  <div id="instructions">&#x1f5b1; Drag to orbit &nbsp;|&nbsp; Scroll to zoom &nbsp;|&nbsp; Right-drag to pan</div>
</div>
<div id="sidebar">
  <div id="sidebar-header">&#x1f4cb; Furniture List</div>
  <div id="item-list"></div>
  <div id="sidebar-legend">
    <div class="leg-row"><div class="leg-sw" style="background:#00b8a5;border:1px solid #00ffd0"></div><span>&#9733; Essential</span></div>
    <div class="leg-row"><div class="leg-sw" style="background:#7a0d0d;border:1px solid #ff4444"></div><span>&#9888; Vastu violation</span></div>
    <div class="leg-row"><div class="leg-sw" style="background:#6688aa;border:1px solid #7788aa"></div><span>&#10003; Detected</span></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const ROOM_W=4.3556036949157715,ROOM_D=3.3504645824432373,ROOM_H=2.5;
const ZONE_COLS={"North-West": "#c3b1e1", "North": "#aec6cf", "North-East": "#a8d8a8", "West": "#f4a460", "Center": "#eeeeee", "East": "#ffd966", "South-West": "#c8a882", "South": "#ff9999", "South-East": "#ffb347"};
const CURRENT=[{"id": 1, "name": "bed", "emoji": "\ud83d\udecf\ufe0f", "px": -0.012506856583058834, "py": 0, "pz": 1.1553339958190918, "fw": 2.0, "fh": 0.6, "fd": 1.8, "color": "#00b8a5", "opacity": 0.92, "cat": "essential", "zone": "South", "compass": "South wall (Yama) \u2014 stability", "status": "\u2605 Essential \u2014 detected"}, {"id": 2, "name": "desk", "emoji": "\ud83d\udda5\ufe0f", "px": 0.4723471701145172, "py": 0, "pz": 1.158413290977478, "fw": 1.4, "fh": 0.75, "fd": 0.7, "color": "#00b8a5", "opacity": 0.92, "cat": "essential", "zone": "East", "compass": "East wall (Surya) \u2014 health & new beginnings", "status": "\u2605 Essential \u2014 detected"}, {"id": 3, "name": "dustbin", "emoji": "\ud83d\uddd1\ufe0f", "px": -0.3825159966945648, "py": 0, "pz": 1.1522386074066162, "fw": 0.8, "fh": 0.8, "fd": 0.8, "color": "#00b8a5", "opacity": 0.92, "cat": "essential", "zone": "South-West", "compass": "South-West corner (Nairutya) \u2014 earth & stability", "status": "\u2605 Essential \u2014 detected"}, {"id": 4, "name": "laptop", "emoji": "\ud83d\udce6", "px": -0.03034631721675396, "py": 0, "pz": 1.1467933654785156, "fw": 0.35, "fh": 0.02, "fd": 0.25, "color": "#7a0d0d", "opacity": 0.88, "cat": "violation", "zone": "South", "compass": "South wall (Yama) \u2014 stability", "status": "\u26a0 Move needed"}];
const OPTIMISED=[{"id": 1, "name": "bed", "emoji": "\ud83d\udecf\ufe0f", "px": -0.015234836377203465, "py": 0, "pz": 1.1554663181304932, "fw": 2.0, "fh": 0.6, "fd": 1.8, "color": "#00b8a5", "opacity": 0.92, "cat": "essential", "zone": "South", "compass": "South wall (Yama) \u2014 stability", "status": "\u2605 Vastu-correct position"}, {"id": 2, "name": "desk", "emoji": "\ud83d\udda5\ufe0f", "px": 0.5095340013504028, "py": 0, "pz": 1.1539548635482788, "fw": 1.4, "fh": 0.75, "fd": 0.7, "color": "#00b8a5", "opacity": 0.92, "cat": "essential", "zone": "East", "compass": "East wall (Surya) \u2014 health & new beginnings", "status": "\u2605 Vastu-correct position"}, {"id": 3, "name": "dustbin", "emoji": "\ud83d\uddd1\ufe0f", "px": -0.4850524067878723, "py": 0, "pz": 1.1519088745117188, "fw": 0.8, "fh": 0.8, "fd": 0.8, "color": "#00b8a5", "opacity": 0.92, "cat": "essential", "zone": "South-West", "compass": "South-West corner (Nairutya) \u2014 earth & stability", "status": "\u2605 Vastu-correct position"}];

const ZONE_GRID=[
  ['North-West',0,0,1/3,1/3],['North',1/3,0,1/3,1/3],['North-East',2/3,0,1/3,1/3],
  ['West',0,1/3,1/3,1/3],['Center',1/3,1/3,1/3,1/3],['East',2/3,1/3,1/3,1/3],
  ['South-West',0,2/3,1/3,1/3],['South',1/3,2/3,1/3,1/3],['South-East',2/3,2/3,1/3,1/3],
];

// ── Renderer ──────────────────────────────────────────────────────────────
const container=document.getElementById('canvas-container');
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(container.clientWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
container.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d0d1a);
scene.fog=new THREE.Fog(0x0d0d1a,18,35);

const camera=new THREE.PerspectiveCamera(45,container.clientWidth/window.innerHeight,0.1,100);
scene.add(new THREE.AmbientLight(0xffffff,0.55));
const dl=new THREE.DirectionalLight(0xffffff,0.9);
dl.position.set(5,10,5);dl.castShadow=true;scene.add(dl);
scene.add(new THREE.HemisphereLight(0x334466,0x0d0d1a,0.4));

// ── Camera orbit ──────────────────────────────────────────────────────────
let isDragging=false,isRight=false,prevM={x:0,y:0};
let theta=0.6,phi=1.1,radius=Math.sqrt(ROOM_W*ROOM_W+ROOM_D*ROOM_D)*1.8,panX=0,panY=0;
function updateCam(){
  camera.position.set(
    radius*Math.sin(phi)*Math.sin(theta)+panX,
    radius*Math.cos(phi)+panY,
    radius*Math.sin(phi)*Math.cos(theta));
  camera.lookAt(panX,panY,ROOM_D/2);
}
updateCam();
container.addEventListener('mousedown',e=>{isDragging=true;isRight=(e.button===2);prevM={x:e.clientX,y:e.clientY};});
container.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('mouseup',()=>isDragging=false);
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const dx=(e.clientX-prevM.x)*0.005,dy=(e.clientY-prevM.y)*0.005;
  if(isRight){panX-=dx*2;panY+=dy*2;}
  else{theta-=dx;phi=Math.max(0.15,Math.min(Math.PI/2-0.05,phi+dy));}
  prevM={x:e.clientX,y:e.clientY};updateCam();
});
container.addEventListener('wheel',e=>{radius=Math.max(2,Math.min(30,radius+e.deltaY*0.02));updateCam();});
let lt=null;
container.addEventListener('touchstart',e=>{lt=e.touches[0];});
container.addEventListener('touchmove',e=>{
  e.preventDefault();const t=e.touches[0];
  theta-=(t.clientX-lt.clientX)*0.006;
  phi=Math.max(0.15,Math.min(Math.PI/2-0.05,phi+(t.clientY-lt.clientY)*0.006));
  lt=t;updateCam();
},{passive:false});

// ── Helpers ───────────────────────────────────────────────────────────────
function hexC(h){return new THREE.Color(h);}
function makeSprite(txt,o={}){
  const fs=o.fontSize||48,col=o.color||'white',bg=o.bg||'rgba(0,0,0,0)';
  const cv=document.createElement('canvas');cv.width=256;cv.height=128;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=bg;ctx.fillRect(0,0,256,128);
  ctx.font=`bold ${fs}px Segoe UI Emoji,Segoe UI,sans-serif`;
  ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(txt,128,64);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthTest:false}));
  sp.scale.set(o.sw||0.9,o.sh||0.45,1);return sp;
}

// ── Floor zones ───────────────────────────────────────────────────────────
function buildFloor(){
  const hw=ROOM_W/2;
  ZONE_GRID.forEach(([zone,cx,cz,wf,df])=>{
    const zw=wf*ROOM_W,zd=df*ROOM_D,x0=-hw+cx*ROOM_W,z0=cz*ROOM_D;
    const col=ZONE_COLS[zone]||'#eee';
    const m=new THREE.Mesh(
      new THREE.PlaneGeometry(zw-0.04,zd-0.04),
      new THREE.MeshLambertMaterial({color:hexC(col),transparent:true,opacity:0.72,side:THREE.DoubleSide}));
    m.rotation.x=-Math.PI/2;m.position.set(x0+zw/2,0.001,z0+zd/2);scene.add(m);
    const el=new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.PlaneGeometry(zw,zd)),
      new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.2}));
    el.rotation.x=-Math.PI/2;el.position.set(x0+zw/2,0.002,z0+zd/2);scene.add(el);
    const sh=zone.replace('North','N').replace('South','S').replace('East','E').replace('West','W').replace('-','');
    const sp=makeSprite(sh,{fontSize:34,color:'#111111',sw:0.75,sh:0.38});
    sp.position.set(x0+zw/2,0.05,z0+zd/2);scene.add(sp);
  });
}

// ── Compass labels ────────────────────────────────────────────────────────
function buildCompass(){
  const hw=ROOM_W/2;
  [['N',0,1.1,-0.25,'#4488ff'],['S',0,1.1,ROOM_D+0.25,'#ff4444'],
   ['W',-hw-0.15,1.1,ROOM_D/2,'#ff9900'],['E',hw+0.15,1.1,ROOM_D/2,'#00bb55']
  ].forEach(([txt,x,y,z,col])=>{
    const cv=document.createElement('canvas');cv.width=200;cv.height=90;
    const ctx=cv.getContext('2d');
    ctx.fillStyle='rgba(18,18,42,0.9)';ctx.roundRect(0,0,200,90,18);ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=3;ctx.roundRect(2,2,196,86,16);ctx.stroke();
    ctx.font='bold 52px Segoe UI,sans-serif';
    ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(txt,100,45);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthTest:false}));
    sp.scale.set(1.1,0.5,1);sp.position.set(x,y,z);scene.add(sp);
  });
}

// ── Furniture ─────────────────────────────────────────────────────────────
const fGroup=new THREE.Group();scene.add(fGroup);
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2(-9,-9);
const meshData=new Map();   // box.uuid → item
let activeRow=null;

function buildFurniture(dataset){
  fGroup.clear();meshData.clear();
  dataset.forEach(item=>{
    const hw=ROOM_W/2;
    const px=item.px-hw, py=item.fh/2, pz=item.pz;
    const geo=new THREE.BoxGeometry(item.fw,item.fh,item.fd);
    const mat=new THREE.MeshLambertMaterial({color:hexC(item.color),transparent:true,opacity:item.opacity});
    const box=new THREE.Mesh(geo,mat);
    box.position.set(px,py,pz);box.castShadow=true;
    fGroup.add(box);meshData.set(box.uuid,item);

    // Edge highlight
    const ec=item.cat==='essential'?0x00ffd0:item.cat==='violation'?0xff4444:0x7788aa;
    box.add(new THREE.LineSegments(
      new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial({color:ec,linewidth:item.cat==='essential'?2:1})));

    // Emoji on top face
    const es=makeSprite(item.emoji,{fontSize:56,sw:0.65,sh:0.65});
    es.position.set(0,item.fh/2+0.02,0);box.add(es);

    // Number badge (top-right corner)
    const numBg=item.cat==='essential'?'rgba(0,255,208,0.95)':item.cat==='violation'?'rgba(200,20,20,0.9)':'rgba(59,47,143,0.9)';
    const numFc=item.cat==='essential'?'#000':'#fff';
    const ns=makeSprite(String(item.id),{fontSize:40,color:numFc,bg:numBg,sw:0.35,sh:0.35});
    ns.position.set(item.fw/2+0.04,item.fh/2+0.34,0);box.add(ns);

    // Furniture name label (always visible, floating above box)
    const nameCol=item.cat==='essential'?'#00ffd0':item.cat==='violation'?'#ff9999':'#e2e8f0';
    const sfx=item.cat==='essential'?' \u2605':item.cat==='violation'?' \u26a0':'';
    const lsp=makeSprite(item.name+sfx,{fontSize:30,color:nameCol,sw:1.15,sh:0.40,bg:'rgba(10,8,35,0.88)'});
    lsp.position.set(0,item.fh/2+0.60,0);box.add(lsp);
  });
}

// ── Sidebar ───────────────────────────────────────────────────────────────
function buildSidebar(dataset){
  const list=document.getElementById('item-list');
  list.innerHTML='';
  dataset.forEach(item=>{
    const row=document.createElement('div');
    row.className='item-row';
    row.dataset.id=item.id;
    const numBg=item.cat==='essential'?'#00ffd0':item.cat==='violation'?'#7a0d0d':'#3b2f8f';
    const numFc=item.cat==='essential'?'#000':'#fff';
    const zoneShort=item.zone.replace('North','N').replace('South','S').replace('East','E').replace('West','W').replace('-','');
    row.innerHTML=`
      <div class="item-num" style="background:${numBg};color:${numFc}">${item.id}</div>
      <div class="item-emoji">${item.emoji}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-zone">${item.zone||'—'} (${zoneShort})</div>
        <div class="item-stat ${item.cat}">${item.status}</div>
      </div>`;
    row.addEventListener('click',()=>highlightItem(item.id, row));
    list.appendChild(row);
  });
}

function highlightItem(id, rowEl){
  // Deactivate previous
  document.querySelectorAll('.item-row').forEach(r=>r.classList.remove('active'));
  if(rowEl) rowEl.classList.add('active');
  activeRow=id;

  // Flash the 3D box
  fGroup.children.forEach(box=>{
    const d=meshData.get(box.uuid);
    if(!d) return;
    const isMat=box.material;
    if(d.id===id){
      // Pulse opacity
      const orig=d.opacity;
      isMat.opacity=1.0;
      setTimeout(()=>{isMat.opacity=orig;},600);
      // Fly camera toward it
      const hw=ROOM_W/2;
      panX=d.px-hw; panY=d.fh/2; updateCam();
    }
  });
}

// ── Tooltip ───────────────────────────────────────────────────────────────
const tip=document.getElementById('tooltip');
function showTip(item,ex,ey){
  tip.innerHTML=`<span class="t-emoji">${item.emoji}</span>
    <div class="t-name">${item.id}. ${item.name}</div>
    <div class="t-zone">&#128205; ${item.zone}</div>
    <div class="t-dir">&#129517; ${item.compass}</div>
    <div class="t-stat ${item.cat}">${item.status}</div>`;
  tip.style.display='block';tip.style.left=(ex+14)+'px';tip.style.top=(ey+14)+'px';
}
function hideTip(){tip.style.display='none';}

container.addEventListener('mousemove',e=>{
  if(isDragging){hideTip();return;}
  mouse.x=(e.clientX/container.clientWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(fGroup.children,true);
  const hit=hits.find(h=>meshData.has(h.object.uuid));
  if(hit){
    const item=meshData.get(hit.object.uuid);
    showTip(item,e.clientX,e.clientY);
    // Highlight sidebar row
    document.querySelectorAll('.item-row').forEach(r=>{
      r.classList.toggle('active', parseInt(r.dataset.id)===item.id);
    });
  } else {
    hideTip();
    if(!activeRow) document.querySelectorAll('.item-row').forEach(r=>r.classList.remove('active'));
  }
});

// ── Toggle ────────────────────────────────────────────────────────────────
let showCurrent=true;
document.getElementById('toggle-btn').addEventListener('click',()=>{
  showCurrent=!showCurrent;
  const data=showCurrent?CURRENT:OPTIMISED;
  buildFurniture(data);
  buildSidebar(data);
  activeRow=null;
  document.getElementById('mode-label').textContent=
    showCurrent?'CURRENT LAYOUT':'✨ VASTU-OPTIMISED LAYOUT';
});

// ── Init ──────────────────────────────────────────────────────────────────
buildFloor();buildCompass();
buildFurniture(CURRENT);buildSidebar(CURRENT);

(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);})();

window.addEventListener('resize',()=>{
  const w=container.clientWidth;
  camera.aspect=w/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(w,window.innerHeight);
});
</script>
</body>
</html>
